name: iptv_macos
description: Professional OTT/IPTV Client Application for macOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Networking
  dio: ^5.9.1
  connectivity_plus: ^7.0.0

  # Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Local Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.3

  # Player — macOS native
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_macos_video: ^1.1.4
  media_kit_native_event_loop: ^1.0.9

  # UI
  cupertino_icons: ^1.0.8

  # Logging
  talker: ^5.1.14
  talker_dio_logger: ^5.1.14

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.3
  path: ^1.9.0
  path_provider: ^2.1.5
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.11.1
  freezed: ^3.2.3
  json_serializable: ^6.11.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
